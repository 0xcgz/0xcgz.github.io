<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkDork | Find What Shouldn't Be Found</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================
   BASE & VARIABLES
========================================= */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f2f0eb;
  --bg2: #e8e5de;
  --fg: #131210;
  --fg2: #2a2925;
  --muted: #9a9690;
  --border: #ccc9c0;
  --border2: #b8b4aa;
  --gold: #c8922a;
  --accent: #d44f2e;
  --accent2: #4a7c9e;
  --green: #3d8c5a;
  --panel-bg: rgba(242, 240, 235, 0.97);
  --card-bg: #eceae4;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

[data-theme="dark"] {
  --bg: #0e0d0b;
  --bg2: #161512;
  --fg: #e8e5dc;
  --fg2: #c8c4b8;
  --muted: #5a5750;
  --border: #252320;
  --border2: #332f2a;
  --gold: #d4a032;
  --accent: #e05535;
  --accent2: #5a9cbf;
  --green: #4aaa6a;
  --panel-bg: rgba(14, 13, 11, 0.98);
  --card-bg: #141310;
  --shadow: 0 2px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
}

html { font-size: 14px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 0 20px 80px;
  transition: background 0.3s, color 0.3s;
  line-height: 1.5;
  position: relative;
}

#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 1;
  transition: opacity 0.3s;
}
[data-theme="light"] #bg-canvas { opacity: 1; }

.wrap { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

/* =========================================
   HEADER
========================================= */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 12px;
  position: relative;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.wordmark {
  font-family: 'Space Mono', monospace;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 2px;
  text-decoration: none;
  color: var(--fg);
}
.wordmark-dark { color: var(--fg); }
.wordmark-light { color: var(--muted); font-weight: 400; }
.wordmark::before {
  display: none;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

.btn-back {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  padding: 5px 12px;
  border-radius: 2px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: none;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.btn-back.show { display: inline-flex; align-items: center; gap: 6px; }
.btn-back:hover { background: var(--fg); color: var(--bg); border-color: var(--fg); }

.header-right { display: flex; align-items: center; gap: 10px; }

.theme-btn {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  padding: 5px 12px;
  border-radius: 2px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.theme-btn:hover { color: var(--fg); border-color: var(--fg); }

/* =========================================
   VIEWS
========================================= */
.view { display: none; }
.view.active { display: block; animation: fadeUp 0.25s ease-out; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* =========================================
   DASHBOARD
========================================= */
.dash-hero {
  padding: 56px 0 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.dash-hero h1 {
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.04em;
  margin-bottom: 16px;
  color: var(--fg);
}
.dash-hero h1 em {
  font-style: normal;
  color: var(--accent);
}
.dash-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.dash-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.dash-card {
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 32px 24px 24px;
  background: var(--card-bg);
  color: var(--fg);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.dash-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
}
.dash-card:hover { border-color: var(--border2); transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.dash-card:hover::after { transform: scaleX(1); }

.dash-card-num {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 20px;
  opacity: 0.6;
}

.dash-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}
.dash-desc {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.65;
  font-weight: 400;
  flex: 1;
  margin-bottom: 20px;
}

.dash-card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.dash-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.dash-arrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  transition: transform 0.2s, color 0.2s;
}
.dash-card:hover .dash-arrow { transform: translate(3px, -3px); color: var(--accent); }

.dash-stats {
  display: flex;
  gap: 40px;
  margin-top: 40px;
  padding: 24px 0;
  border-top: 1px solid var(--border);
  justify-content: center;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Space Mono', monospace;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--fg);
  display: block;
}
.stat-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
}

/* =========================================
   CONTROL PANEL
========================================= */
.control-panel {
  position: sticky;
  top: 0;
  background: var(--panel-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 100;
  padding: 20px 0 16px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.site-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.site-prefix {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  color: var(--gold);
  white-space: nowrap;
  min-width: 36px;
}
.site-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 9px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 0.78rem;
  color: var(--fg);
  outline: none;
  transition: border-color 0.15s;
}
.site-input:focus { border-color: var(--accent2); }
.site-input::placeholder { color: var(--muted); }

.btn-clear {
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  width: 32px;
  height: 32px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-clear:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.query-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 16px;
  margin-bottom: 10px;
  min-height: 46px;
  font-family: 'Space Mono', monospace;
  font-size: 0.88rem;
  line-height: 1.8;
  word-break: break-all;
  color: var(--fg);
  transition: background 0.2s;
}
[data-theme="dark"] .query-box { background: #161512; }
.query-box .ph { color: var(--muted); font-style: italic; }
.q-site { color: var(--gold); }
.q-op { color: var(--accent2); }
.q-val { color: var(--fg); }

.action-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn-primary {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 3px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
  letter-spacing: 0.03em;
}
.btn-primary:hover { background: var(--fg); }

.btn-secondary {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  padding: 8px 16px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.btn-secondary:hover { background: var(--fg); color: var(--bg); border-color: var(--fg); }

/* =========================================
   SECTION LABEL
========================================= */
.sec-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 16px;
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* =========================================
   FILTER & TABS
========================================= */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.search-box {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 0.74rem;
  color: var(--fg);
  outline: none;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--accent2); }
.search-box::placeholder { color: var(--muted); }

.tabs-wrapper {
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 16px;
  scrollbar-width: none;
}
.tabs-wrapper::-webkit-scrollbar { display: none; }
.tabs { display: flex; gap: 4px; width: max-content; }
.tab {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  padding: 5px 12px;
  border-radius: 2px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
  white-space: nowrap;
  text-transform: uppercase;
}
.tab:hover { color: var(--fg); border-color: var(--fg); }
.tab.active {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}

/* =========================================
   CARD GRID
========================================= */
.grid-layout {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}

.card-base {
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 14px;
  cursor: pointer;
  background: var(--card-bg);
  position: relative;
  text-decoration: none;
  color: var(--fg);
  text-align: left;
  display: block;
  transition: all 0.15s;
  overflow: hidden;
}
.card-base::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: transparent;
  transition: background 0.15s;
}
.card-base:hover::before, .card-base.sel::before { background: var(--accent); }
.card-base:hover {
  border-color: var(--border2);
  background: var(--bg2);
  transform: translateX(2px);
}
.card-base.sel {
  border-color: var(--accent);
  background: var(--bg2);
}

.pc-name, .tool-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pc-query, .tool-desc {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pc-cat, .tool-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.64rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  opacity: 0.8;
}

.badge {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 1px 5px;
  margin-left: 5px;
  vertical-align: middle;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.badge-ext { border-color: var(--accent2); color: var(--accent2); }
.badge-dom { border-color: var(--gold); color: var(--gold); }

/* OSINT tool cards */
.tool-card {
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 14px 10px;
  background: var(--card-bg);
  text-decoration: none;
  color: var(--fg);
  display: block;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.tool-card::after {
  content: '↗';
  position: absolute;
  top: 10px; right: 12px;
  font-size: 0.7rem;
  color: var(--muted);
  transition: all 0.15s;
}
.tool-card:hover { background: var(--fg); color: var(--bg); border-color: var(--fg); transform: translateY(-2px); box-shadow: var(--shadow); }
.tool-card:hover .tool-desc { color: rgba(128,128,128,0.9); }
.tool-card:hover::after { color: var(--bg); transform: translate(2px, -2px); }
.tool-card:hover .tool-tag { color: rgba(128,128,128,0.7); }

/* =========================================
   FOOTER
========================================= */
footer {
  padding-top: 28px;
  border-top: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  text-align: center;
  margin-top: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 6px;
}
footer a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
footer a:hover { color: var(--fg); }

/* =========================================
   TOAST
========================================= */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--fg);
  color: var(--bg);
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  padding: 10px 20px;
  border-radius: 3px;
  opacity: 0;
  transition: all 0.2s ease;
  pointer-events: none;
  z-index: 999;
  letter-spacing: 0.05em;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* =========================================
   NO RESULTS
========================================= */
.no-results {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  text-align: center;
  padding: 40px 0;
  grid-column: 1 / -1;
}

/* =========================================
   RESPONSIVE
========================================= */
@media (max-width: 700px) {
  body { padding: 0 14px 60px; }
  .dash-grid { grid-template-columns: 1fr; }
  .grid-layout { grid-template-columns: 1fr 1fr; }
  .dash-stats { gap: 16px; flex-wrap: wrap; }
  .action-row { flex-direction: column; }
  .btn-primary, .btn-secondary { justify-content: center; }
  .dash-hero h1 { font-size: 2rem; }
}

@media (max-width: 500px) {
  .grid-layout { grid-template-columns: 1fr; }
}

/* =========================================
   SCROLLBAR
========================================= */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* =========================================
   SELECTION
========================================= */
::selection { background: var(--accent); color: #fff; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">

  <header>
    <div class="header-left">
      <div class="wordmark" onclick="switchView('dashboard')">
        <span class="wordmark-dark">Dark</span><span class="wordmark-light">Dork</span>
      </div>
      <button class="btn-back" id="backBtn" onclick="switchView('dashboard')">← back</button>
    </div>
    <div class="header-right">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">◐ light</button>
    </div>
  </header>

  <!-- ===== DASHBOARD ===== -->
  <main id="view-dashboard" class="view active">
    <div class="dash-hero">
      <h1>Find What<br>Shouldn't Be <em>Found.</em></h1>
      <div class="dash-sub">for the ones who dig deeper.</div>
    </div>

    <div class="dash-grid">
      <button class="dash-card" onclick="switchView('dorking')">
        <div class="dash-card-num">01</div>
        <div class="dash-title">Google Dorking</div>
        <div class="dash-desc">Query builder for exposed files, credentials, admin panels, and vulnerabilities.</div>
        <div class="dash-card-foot">
          <span class="dash-tag">dorks</span>
          <span class="dash-arrow">↗</span>
        </div>
      </button>

      <button class="dash-card" onclick="switchView('bugbounty')">
        <div class="dash-card-num">02</div>
        <div class="dash-title">Bug Bounty Search</div>
        <div class="dash-desc">Automated recon queries for Wayback, crt.sh, GitHub, subdomains & more.</div>
        <div class="dash-card-foot">
          <span class="dash-tag">recon</span>
          <span class="dash-arrow">↗</span>
        </div>
      </button>

      <button class="dash-card" onclick="switchView('osint')">
        <div class="dash-card-num">03</div>
        <div class="dash-title">OSINT Toolkit</div>
        <div class="dash-desc">Curated library of 20+ external intelligence platforms by use case.</div>
        <div class="dash-card-foot">
          <span class="dash-tag">intel</span>
          <span class="dash-arrow">↗</span>
        </div>
      </button>
    </div>

    <div class="dash-stats">
      <div class="stat-item">
        <span class="stat-num" id="stat-dorks">0</span>
        <span class="stat-lbl">Dork Presets</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-bb">0</span>
        <span class="stat-lbl">BB Queries</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-osint">0</span>
        <span class="stat-lbl">OSINT Tools</span>
      </div>
    </div>
  </main>

  <!-- ===== SHARED CONTROL PANEL ===== -->
  <div class="control-panel view" id="shared-panel">
    <div class="site-row">
      <span class="site-prefix">site:</span>
      <input class="site-input" id="siteInput" type="text" placeholder="target domain — e.g. example.com" oninput="buildPreview()">
      <button class="btn-clear" onclick="document.getElementById('siteInput').value='';buildPreview();" title="Clear">×</button>
    </div>
    <div class="query-box" id="preview"><span class="ph">← select a preset below to build query</span></div>
    <div class="action-row">
      <button class="btn-primary" id="searchBtn" onclick="return doSearch()">↗ Search Google</button>
      <button class="btn-secondary" onclick="copyQ()">⎈ Copy Query</button>
    </div>
  </div>

  <!-- ===== DORKING VIEW ===== -->
  <main id="view-dorking" class="view">
    <div class="sec-label">Google Dorks</div>
    <div class="filter-row">
      <input class="search-box" type="search" id="dorkFilter" placeholder="Filter dorks..." oninput="renderDorks('dorking')">
    </div>
    <nav class="tabs-wrapper"><div class="tabs" id="dorkingTabs"></div></nav>
    <div class="grid-layout" id="dorkingGrid"></div>
  </main>

// --- UTILS ---
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function getActiveData() { return currentView === 'dorking' ? DORKING_DATA : BUGBOUNTY_DATA; }
function getSelectedDork() { if(selected === null) return null; return getActiveData()[selected]; }

function engineLabel(e) {
  var m = {
    github:'github.com', crossdomain:'crossdomain.xml', threatcrowd:'threatcrowd.org',
    yandex_swf:'yandex.com', wayback_swf1:'web.archive.org', wayback_swf2:'web.archive.org',
    wayback1:'web.archive.org', wayback2:'web.archive.org', crtsh:'crt.sh',
    openbugbounty:'openbugbounty.org', reddit:'reddit.com', wayback_wp:'archive.org',
    censys_ip:'censys.io', censys_domain:'censys.io', censys_cert:'censys.io', shodan:'shodan.io'
  };
  return m[e] || e;
}

function resolveExt(dork, d) {
  var e = dork.engine;
  if(e==='github') return 'https://github.com/search?q=' + encodeURIComponent('"*.'+d+'"') + '&type=host';
  if(e==='crossdomain') return 'http://' + d + '/crossdomain.xml';
  if(e==='threatcrowd') return 'http://threatcrowd.org/domain.php?domain=' + d;
  if(e==='yandex_swf') return 'https://yandex.com/search/?text=' + encodeURIComponent('site:' + d + ' mime:swf');
  if(e==='wayback_swf1') return 'https://web.archive.org/cdx/search?url=' + encodeURIComponent(d) + '/&matchType=domain&collapse=urlkey&output=text&fl=original&filter=urlkey:.*swf&limit=100000';
  if(e==='wayback_swf2') return 'https://web.archive.org/cdx/search?url=' + encodeURIComponent(d) + '/&matchType=domain&collapse=urlkey&output=text&fl=original&filter=mimetype:application/x-shockwave-flash&limit=100000';
  if(e==='wayback1') return 'https://web.archive.org/web/*/(' + encodeURIComponent('.' + d) + ')';
  if(e==='wayback2') return 'https://web.archive.org/web/*/' + encodeURIComponent(d) + '/*';
  if(e==='crtsh') return 'https://crt.sh/?q=%25.' + d;
  if(e==='openbugbounty') return 'https://www.openbugbounty.org/search/?search=' + encodeURIComponent(d) + '&type=host';
  if(e==='reddit') return 'https://www.reddit.com/search/?q=' + encodeURIComponent(d) + '&source=recent';
  if(e==='wayback_wp') return 'http://wwwb-dedup.us.archive.org:8083/cdx/search?url=' + encodeURIComponent('+inurl:'+d+' +ext:wp- | +inurl:'+d+' +ext:wp-content') + '/&matchType=domain&collapse=digest&output=text&fl=original,timestamp&filter=urlkey:.*wp[-].*&limit=1000000';
  if(e==='censys_ip') return 'https://censys.io/ipv4?q=' + d;
  if(e==='censys_domain') return 'https://censys.io/domain?q=' + d;
  if(e==='censys_cert') return 'https://censys.io/certificates?q=' + d;
  if(e==='shodan') return 'https://www.shodan.io/search?query=' + d;
  return 'https://google.com/search?q=' + d;
}

// --- ROUTING ---
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');

  var backBtn = document.getElementById('backBtn');
  view === 'dashboard' ? backBtn.classList.remove('show') : backBtn.classList.add('show');

  var panel = document.getElementById('shared-panel');
  if(view === 'dorking' || view === 'bugbounty') {
    panel.classList.add('active');
    selected = null; buildPreview();
    renderDorks(view);
  } else {
    panel.classList.remove('active');
    if(view === 'osint') renderOSINT();
  }

  window.scrollTo(0, 0);
}

// --- PREVIEW BUILDER ---
function buildPreview() {
  var box = document.getElementById('preview');
  var dork = getSelectedDork();
  if (!dork) { box.innerHTML = '<span class="ph">← select a preset below to build query</span>'; return; }

  var domain = document.getElementById('siteInput').value.trim();

  if (dork.ext && dork.engine !== 'google') {
    var url = domain ? resolveExt(dork, domain) : null;
    box.innerHTML = domain
      ? `<span class="q-site">${esc(domain)}</span> → <span class="q-val">${esc(url)}</span>`
      : '<span class="ph">set a target domain above ↑</span>';
    document.getElementById('searchBtn').textContent = '↗ Open ' + engineLabel(dork.engine);
    return;
  }

  var raw = dork.q || '';
  if (dork.needsDomain && domain) raw = raw.replace(/{domain}/g, domain);
  var siteToken = (!dork.needsDomain && domain) ? `<span class="q-site">site:${esc(domain)}</span> ` : '';
  box.innerHTML = siteToken + raw.replace(/(site:|inurl:|intitle:|intext:|filetype:|ext:)(\S+)/g,
    '<span class="q-op">$1</span><span class="q-val">$2</span>');

  document.getElementById('searchBtn').textContent = '↗ Search Google';
}

function selectDork(idx) { selected = idx; buildPreview(); }

function doSearch() {
  var dork = getSelectedDork();
  if (!dork) return false;
  var domain = document.getElementById('siteInput').value.trim();
  if (dork.ext && dork.engine !== 'google') {
    if (!domain) return alert('Enter a target domain first.');
    window.open(resolveExt(dork, domain), '_blank');
  } else {
    var q = dork.q || '';
    if (dork.needsDomain && !domain) return alert('Enter a target domain first.');
    if (dork.needsDomain) q = q.replace(/{domain}/g, domain);
    var finalQ = (!dork.needsDomain && domain) ? 'site:' + domain + ' ' + q : q;
    window.open('https://www.google.com/search?q=' + encodeURIComponent(finalQ), '_blank');
  }
}

function copyQ() {
  var dork = getSelectedDork(); if(!dork) return;
  var domain = document.getElementById('siteInput').value.trim();
  var txt = '';
  if(dork.ext && dork.engine !== 'google') {
    if (!domain) return alert('Enter a target domain first.');
    txt = resolveExt(dork, domain);
  } else {
    txt = dork.q || '';
    if (dork.needsDomain && !domain) return alert('Enter a target domain first.');
    if (dork.needsDomain) txt = txt.replace(/{domain}/g, domain);
    txt = (!dork.needsDomain && domain) ? 'site:' + domain + ' ' + txt : txt;
  }
  if(txt) navigator.clipboard.writeText(txt).then(()=>toast('copied to clipboard!')).catch(()=>toast('copy failed'));
}

// --- RENDER ---
function renderTabs(view, data) {
  var cats = ['all', ...new Set(data.map(d => d.cat))];
  var tabsId = view === 'dorking' ? 'dorkingTabs' : 'bbTabs';
  document.getElementById(tabsId).innerHTML = cats.map(c =>
    `<button class="tab ${activeTab[view]===c?'active':''}" onclick="activeTab['${view}']='${c}'; renderDorks('${view}')">${esc(c)}</button>`
  ).join('');
}

function renderDorks(view) {
  var data = view === 'dorking' ? DORKING_DATA : BUGBOUNTY_DATA;
  var filterId = view === 'dorking' ? 'dorkFilter' : 'bbFilter';
  var gridId = view === 'dorking' ? 'dorkingGrid' : 'bbGrid';
  var tabsId = view === 'dorking' ? 'dorkingTabs' : 'bbTabs';
  var filter = document.getElementById(filterId).value.toLowerCase();

  if(!document.getElementById(tabsId).innerHTML) renderTabs(view, data);

  var html = '';
  data.forEach((d, i) => {
    if (activeTab[view] !== 'all' && d.cat !== activeTab[view]) return;
    if (filter && !d.name.toLowerCase().includes(filter) && !(d.q||'').toLowerCase().includes(filter)) return;

    var isSel = selected === i ? ' sel' : '';
    var badge = d.ext ? '<span class="badge badge-ext">ext</span>' : '';
    var dom = d.needsDomain ? '<span class="badge badge-dom">domain</span>' : '';

    html += `<button class="card-base${isSel}" onclick="selectDork(${i})">
      <div class="pc-name">${esc(d.name)}${badge}${dom}</div>
      <div class="pc-query">${esc(d.q || engineLabel(d.engine))}</div>
      <div class="pc-cat">${esc(d.cat)}</div>
    </button>`;
  });
  document.getElementById(gridId).innerHTML = html || '<div class="no-results">no matches found</div>';
}

function renderOSINT() {
  var cats = ['all', ...new Set(OSINT_TOOLS.map(t => t.cat))];
  document.getElementById('toolTabs').innerHTML = cats.map(c =>
    `<button class="tab ${activeTab.osint===c?'active':''}" onclick="activeTab.osint='${c}'; renderOSINT()">${esc(c)}</button>`
  ).join('');

  var html = OSINT_TOOLS.filter(t => activeTab.osint === 'all' || t.cat === activeTab.osint)
    .map(t => `<a class="tool-card" href="${esc(t.url)}" target="_blank" rel="noopener">
      <div class="tool-name">${esc(t.name)}</div>
      <div class="tool-desc">${esc(t.desc)}</div>
      <div class="tool-tag">${esc(t.cat)}</div>
    </a>`).join('');
  document.getElementById('toolsGrid').innerHTML = html;
}

// --- THEME ---
function toggleTheme() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  var next = dark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '◐ light' : '◐ dark';
  try { localStorage.setItem('dd-theme', next); } catch(e){}
}

(function(){
  try {
    var s = localStorage.getItem('dd-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', s);
    var b = document.getElementById('themeBtn');
    if (b) b.textContent = s === 'dark' ? '◐ light' : '◐ dark';
  } catch(e){}
})();

// --- INIT ---
document.getElementById('stat-dorks').textContent = DORKING_DATA.length;
document.getElementById('stat-bb').textContent = BUGBOUNTY_DATA.length;
document.getElementById('stat-osint').textContent = OSINT_TOOLS.length;
renderOSINT();
</script>

<script>
// ═══════════════════════════════════════════════════════════════
//  3D INTERACTIVE RECON NETWORK  —  pure Canvas 2D, no deps
// ═══════════════════════════════════════════════════════════════
(function () {
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var W, H;

  var nodes = [];
  var numNodes = 250;
  var focal = 1000;
  var mouseX = 0, mouseY = 0;
  var rx = 0, ry = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', function(e) {
    mouseX = (e.clientX / W - 0.5) * 2;
    mouseY = (e.clientY / H - 0.5) * 2;
  });

  function init() {
    nodes = [];
    for (var i = 0; i < numNodes; i++) {
      // Fibonacci sphere distribution for a global recon radar look
      var phi   = Math.acos(-1 + (2 * i) / numNodes);
      var theta = Math.sqrt(numNodes * Math.PI) * phi;
      // Randomize radius slightly to create a data cloud depth
      var r = 380 + Math.random() * 120 * (Math.random() > 0.5 ? 1 : -1);
      nodes.push({
        ox: r * Math.cos(theta) * Math.sin(phi),
        oy: r * Math.sin(theta) * Math.sin(phi),
        oz: r * Math.cos(phi),
        // 10% of nodes act as "High Value Targets" (red/orange accent)
        isTarget: Math.random() > 0.9,
        pulseOffset: Math.random() * Math.PI * 2
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    var time = Date.now() * 0.001;

    // Auto-rotation + Mouse Influence
    rx += (mouseY * 0.3 - rx) * 0.05;
    ry += (mouseX * 0.3 + 0.0015 - ry) * 0.05; // 0.0015 forces constant slow spin

    var cx = Math.cos(rx), sx = Math.sin(rx);
    var cy = Math.cos(ry), sy = Math.sin(ry);

    var projected = [];

    // Rotate and project points
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];

      // Gentle floating effect per node
      var fx = n.ox + Math.sin(time + n.pulseOffset) * 12;
      var fy = n.oy + Math.cos(time + n.pulseOffset) * 12;
      var fz = n.oz;

      // Y-axis rotation
      var x1 = fx * cy - fz * sy;
      var z1 = fz * cy + fx * sy;

      // X-axis rotation
      var y2 = fy * cx - z1 * sx;
      var z2 = z1 * cx + fy * sx;

      var z3 = z2 + 900; // Move globe back from the camera

      if (z3 > 100) {
        var scale = focal / z3;
        projected.push({
          idx: i,
          x: W / 2 + x1 * scale,
          y: H / 2 + y2 * scale,
          z: z3,
          scale: scale,
          target: n.isTarget,
          po: n.pulseOffset,
          ox: x1, oy: y2, oz: z2
        });
      }
    }

    // Draw network connections (Plexus)
    ctx.lineWidth = 1;
    for (var i = 0; i < projected.length; i++) {
      var p1 = projected[i];
      for (var j = i + 1; j < projected.length; j++) {
        var p2 = projected[j];

        var dx = p1.ox - p2.ox;
        var dy = p1.oy - p2.oy;
        var dz = p1.oz - p2.oz;
        var distSq = dx*dx + dy*dy + dz*dz;

        var maxDist = 25000;
        if (distSq < maxDist) {
          var alpha = (1 - distSq / maxDist) * 0.35;
          var isSpecial = p1.target || p2.target;

          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);

          if (isSpecial) {
            // Pulse the opacity of lines connected to target nodes
            var p = (Math.sin(time * 3 + p1.po) + 1) / 2;
            ctx.strokeStyle = 'rgba(212, 79, 46, ' + (alpha * 1.5 * (0.5 + p * 0.5)) + ')';
            ctx.lineWidth = 1.2 * Math.min(p1.scale, p2.scale);
          } else {
            ctx.strokeStyle = 'rgba(154, 150, 144, ' + alpha + ')';
            ctx.lineWidth = 0.8 * Math.min(p1.scale, p2.scale);
          }
          ctx.stroke();
        }
      }
    }

    // Draw nodes
    for (var i = 0; i < projected.length; i++) {
      var p = projected[i];
      var depthAlpha = Math.min(1, 1000 / p.z);

      ctx.beginPath();
      if (p.target) {
        // High Value Target nodes
        var pulse = (Math.sin(time * 4 + p.po) + 1) / 2;
        var rad = (2 + pulse * 2) * p.scale;

        ctx.arc(p.x, p.y, rad, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(212, 79, 46, ' + (depthAlpha * (0.6 + pulse * 0.4)) + ')';
        ctx.fill();

        // Target Radar Ring
        ctx.beginPath();
        ctx.arc(p.x, p.y, rad * 2.5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(212, 79, 46, ' + (depthAlpha * 0.3 * (1 - pulse)) + ')';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      } else {
        // Standard nodes
        ctx.arc(p.x, p.y, 1.2 * p.scale, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(154, 150, 144, ' + (depthAlpha * 0.8) + ')';
        ctx.fill();
      }
    }

    // Smooth vignette overlay blending into the background color
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var bgColor = isDark ? '14, 13, 11' : '242, 240, 235';
    var grad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.2, W/2, H/2, Math.max(W,H)*0.75);
    grad.addColorStop(0, 'rgba(' + bgColor + ', 0)');
    grad.addColorStop(1, 'rgba(' + bgColor + ', 1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    requestAnimationFrame(draw);
  }

  resize();
  init();
  draw();
})();
</script>
