<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkDork</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f4f0;
  --fg: #111;
  --muted: #888;
  --border: #d4d2cc;
  --tag: #e8e6e0;
  --red: #c0392b;
}

html { font-size: 14px; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  padding: 48px 24px 80px;
}

.wrap { max-width: 760px; margin: 0 auto; }

header {
  margin-bottom: 40px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.wordmark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.wordmark span { color: var(--muted); font-weight: 400; }

.header-sub {
  font-size: 0.75rem;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}

.query-box {
  background: var(--fg);
  color: var(--bg);
  border-radius: 4px;
  padding: 16px 18px;
  margin-bottom: 16px;
  min-height: 54px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  line-height: 1.9;
  word-break: break-all;
  user-select: all;
}

.query-box .ph { color: #555; font-style: italic; }

.actions {
  display: flex;
  gap: 8px;
  margin-bottom: 36px;
  flex-wrap: wrap;
}

button, a.btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--fg);
  text-decoration: none;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

button:hover, a.btn:hover {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}

button.ghost { color: var(--muted); }
button.ghost:hover { color: var(--bg); }

.filter-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 180px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--fg);
  outline: none;
  transition: border-color 0.15s;
}

.search-box:focus { border-color: var(--fg); }
.search-box::placeholder { color: var(--muted); }

.count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  white-space: nowrap;
}

.cats {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 20px;
}

.cat-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.67rem;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}

.cat-btn:hover { color: var(--fg); border-color: var(--fg); background: transparent; }
.cat-btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }

.presets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 6px;
  margin-bottom: 40px;
}

.preset-card {
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.1s;
  background: var(--bg);
}

.preset-card:hover,
.preset-card.selected {
  border-color: var(--fg);
  background: var(--fg);
  color: var(--bg);
}

.preset-card:hover .pc-query,
.preset-card.selected .pc-query { color: #999; }

.preset-card:hover .pc-cat,
.preset-card.selected .pc-cat { color: #666; }

.pc-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.73rem;
  font-weight: 600;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pc-query {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 5px;
}

.pc-cat {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  color: #c0bfba;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.no-results {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
  padding: 20px 0;
  grid-column: 1/-1;
}

footer {
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  line-height: 1.9;
}

footer a { color: var(--muted); }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--fg);
  color: var(--bg);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  padding: 8px 14px;
  border-radius: 3px;
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.2s ease;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 500px) {
  .presets-grid { grid-template-columns: 1fr 1fr; }
  header { flex-direction: column; gap: 4px; }
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="wordmark">Dark<span>Dork</span></div>
    <div class="header-sub">google dork library — osint & recon</div>
  </header>

  <div class="query-box" id="preview">
    <span class="ph">← pick a dork below to load its query</span>
  </div>

  <div class="actions">
    <a class="btn" href="#" onclick="return doSearch()">↗ search google</a>
    <button onclick="copyQ()">⎘ copy query</button>
    <button class="ghost" onclick="clearSel()">× clear</button>
  </div>

  <div class="filter-row">
    <input class="search-box" type="text" id="filterInput" placeholder="filter dorks..." oninput="renderCards()">
    <span class="count" id="countLabel"></span>
  </div>

  <div class="cats" id="catTabs"></div>
  <div class="presets-grid" id="grid"></div>

  <footer>
    ⚠ for authorized security research & osint only. unauthorized access to systems is illegal.<br>
    built by <a href="https://0xcgz.github.io">0xcgz</a>
  </footer>

</div>

function renderCats() {
  document.getElementById('catTabs').innerHTML = CATS.map(c => `
    <div class="cat-btn ${activeCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>
  `).join('');
}

function setCat(c) {
  activeCat = c;
  renderCats();
  renderCards();
}

function renderCards() {
  const filter = document.getElementById('filterInput').value.toLowerCase();
  const list = PRESETS.filter(p => {
    const catOk = activeCat === 'all' || p.cat === activeCat;
    const textOk = !filter || p.name.toLowerCase().includes(filter) || p.q.toLowerCase().includes(filter) || p.cat.includes(filter);
    return catOk && textOk;
  });

  document.getElementById('countLabel').textContent = list.length + ' dorks';

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">no matching dorks.</div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const idx = PRESETS.indexOf(p);
    return `
      <div class="preset-card ${selected===idx?'selected':''}" onclick="selectPreset(${idx})">
        <div class="pc-name">${escHtml(p.name)}</div>
        <div class="pc-query">${escHtml(p.q)}</div>
        <div class="pc-cat">${p.cat}</div>
      </div>
    `;
  }).join('');
}

function selectPreset(idx) {
  selected = idx;
  document.getElementById('preview').textContent = PRESETS[idx].q;
  renderCards();
}

function clearSel() {
  selected = null;
  document.getElementById('preview').innerHTML = '<span class="ph">← pick a dork below to load its query</span>';
  renderCards();
}

function getQ() {
  return selected !== null ? PRESETS[selected].q : '';
}

function doSearch() {
  const q = getQ();
  if (!q) return false;
  window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
  return false;
}

function copyQ() {
  const q = getQ();
  if (!q) return;
  navigator.clipboard.writeText(q).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  });
}

renderCats();
renderCards();
</script>
</body>
</html>
